<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOGPX Suite - Strona Główna</title>
    
    <!-- Tailwind CSS -->
    <script src="tailwind.js"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->

    <style>
        body { margin: 0; overflow: hidden; background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #root { height: 100vh; display: flex; flex-direction: column; }
        
        /* Animacje wejścia */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        /* Styl dla scrollbara */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

                supportTitle: "Support the project",

                supportBtn: "Learn more",
                cooperation: "In cooperation with",
                underConstruction: "Under Construction"
            }

            const [view, setView] = React.useState('home');
            const [isSidebarOpen, setIsSidebarOpen] = React.useState(window.innerWidth >= 768);
            const [lang, setLang] = React.useState('pl');

            const t = (key) => translations[lang][key] || key;

            React.useEffect(() => {
                const handleResize = () => {
                    if (window.innerWidth >= 768) {
                        setIsSidebarOpen(true);
                    } else {
                        setIsSidebarOpen(false);
                    }
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            React.useEffect(() => {
                document.title = t('pageTitle');
                document.documentElement.lang = lang;
            }, [lang]);

            const handleNavClick = (targetView) => {
                setView(targetView);
                if (window.innerWidth < 768) {
                    setIsSidebarOpen(false);
                }
            };

            const NavButton = ({ id, label, icon, version, colorClass }) => (
                <button 
                    onClick={() => handleNavClick(id)}
                    className={`w-full flex items-center gap-2.5 px-4 py-2.5 rounded-xl transition-all duration-200 text-[12.5px] ${
                        view === id 
                        ? `bg-${colorClass}-50 text-${colorClass}-700 font-semibold shadow-sm` 
                        : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900 font-medium'
                    }`}
                >
                    <span className={view === id ? `text-${colorClass}-600` : 'text-slate-400'}>{icon}</span>
                    {label} {version && <span className="text-[9px] ml-auto opacity-50 font-normal">{version}</span>}
                </button>
            );

                <div className="flex h-screen w-full text-slate-800 bg-slate-50 overflow-hidden relative">

                        <div 
                            className="fixed inset-0 bg-slate-900/50 z-30 md:hidden animate-fade-in"
                            onClick={() => setIsSidebarOpen(false)}
                        ></div>

                        onClick={() => setIsSidebarOpen(true)}
                        className={`absolute top-4 left-4 z-20 p-2 bg-white rounded-lg shadow-sm text-slate-600 hover:text-blue-600 hover:bg-blue-50 transition-all border border-slate-200 ${isSidebarOpen ? 'hidden' : 'block'}`}

                                <div className="bg-slate-100 p-1 rounded-lg inline-flex">

                                    <IconClose />
                                </button>

                                    GEOGPX Suite

                                <p className="text-[8px] text-slate-400 mt-1 uppercase tracking-widest font-bold">
                                    {t('subtitle')}
                                </p>
                            </div>
                        </div>
                        
                        {/* Główna sekcja przewijana - MENU */}
                        <div className="flex-1 overflow-y-auto flex flex-col">
                            <nav className="px-3 space-y-0.5 pb-4">
                                <NavButton id="home" label={t('navHome')} icon={<IconHome />} colorClass="blue" />
                                
                                <div className="pt-3 pb-1">
                                    <p className="text-[9px] font-bold text-slate-400 px-3 uppercase tracking-wider">{t('navTools')}</p>
                                </div>

                                <NavButton id="multibno" label="GEOGPX MultiBnO" icon={<IconLayers />} version="v.1.0" colorClass="emerald" />
                                <NavButton id="draw" label="GEOGPX Draw" icon={<IconEdit />} version="v.1.1" colorClass="amber" />
                                <NavButton id="race" label="GEOGPX RACE" icon={<IconPlay />} version="v.1.0" colorClass="rose" />
                                <NavButton id="total" label="GEOGPX Total" icon={<IconActivity />} version="v.1.3" colorClass="indigo" />

                                <NavButton id="support" label={t('supportTitle')} icon={<IconStar />} colorClass="pink" />

                                <div className="pt-3 pb-1">
                                    <p className="text-[9px] font-bold text-slate-400 px-3 uppercase tracking-wider">{t('navHelp')}</p>
                                </div>
                                <NavButton id="manual" label={t('navManual')} icon={<IconBook />} colorClass="slate" />
                            </nav>
                        </div>

                                <span className="text-[8px] font-bold uppercase tracking-widest text-slate-400 group-hover:text-blue-600 transition-colors">{t('adSpaceShort')}</span>
                                <span className="text-[7.2px] mt-0.5 text-slate-400 leading-tight">{t('adDescShort')}</span>
                            </div>
                        </div>

                        {/* DOLNY LEWY RÓG: Stopka in cooperation with NocnyTurysta */}
                        {/* PRZENIESIONO W PRAWY DOLNY RÓG */}
                    </div>
                    {/* ========================================= */}
                    {/* KONIEC PANELU BOCZNEGO                    */}
                    {/* ========================================= */}

                                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">
                                                {t('highPrecision')}

                                        </h2>
                                        <p className="text-sm md:text-base text-slate-600 leading-relaxed max-w-2xl font-light">

                                                <li>{t('totalL2')}</li>
                                                <li>{t('totalL3')}</li>
                                            </ul>
                                        </section>

                    {/* KONIEC GŁÓWNEGO OBSZARU ZAWARTOŚCI        */}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
